{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card glass-panel text-white p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary fs-1 mb-2"></i>
                    <h2 class="fw-bold">Scoring Registry</h2>
                    <p class="text-secondary small">Register a credit analyst account</p>
                </div>
                
                <form action="{{ url_for('register') }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="john.doe@bank.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="role" class="form-label">Analyst Role</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-briefcase"></i></span>
                            <select class="form-select" id="role" name="role" required>
                                <option value="User" selected>Junior Credit Analyst</option>
                                <option value="Admin">Senior Underwriting Officer (Admin)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary-glass py-2 fw-semibold">Register Analyst</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-secondary small mb-0">Already registered? <a href="{{ url_for('login') }}" class="text-primary fw-medium text-decoration-none">Log In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
