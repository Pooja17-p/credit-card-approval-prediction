{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card glass-panel text-white p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary fs-1 mb-2"></i>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-secondary small">Access the credit underwriting and ML scoring portal</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@bank.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary-glass py-2 fw-semibold">Authorize Session</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-secondary small mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-medium text-decoration-none">Sign Up</a></p>
                </div>

                <!-- Credentials Assistant -->
                <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 text-center">
                    <p class="text-info small mb-2"><i class="bi bi-info-circle"></i> Verification Accounts (Auto-Seeded):</p>
                    <div class="d-flex justify-content-center gap-3 small text-secondary">
                        <div>
                            <span class="d-block text-white-50"><strong>Admin Analyst</strong></span>
                            <code>admin@bank.com</code> / <code>admin123</code>
                        </div>
                        <div class="border-start border-secondary border-opacity-25 ps-3">
                            <span class="d-block text-white-50"><strong>Junior Analyst</strong></span>
                            <code>clara@bank.com</code> / <code>clara123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
